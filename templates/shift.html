<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/png" sizes="400x400" href="/icon_ms.png">
    <link rel="manifest" href="/ms/manifest.json">
    <meta name="theme-color" content="#000000">
    <style type="text/css">
        body, html {
            padding: 0;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            user-select: none;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            inset: 0;
            font-size: 10px;
        }
        #scrollframe {
            display: flex;
            position: relative;
            width: 100%;
            height: 100%;
        }
        #content {
            justify-content: center;
            width: 100%;
            height: 100%;
            text-align: center;
            overflow-y: auto;
            will-change: transform;
            -webkit-overflow-scrolling: touch;
        }
        #dateData {
            font-size: 1.8em;
            line-height: 0.9;
        }
        #shiftData {
            display: inline-block;
            text-align: left;
            font-size: 2em;
            line-height: 1.2;
        }
        .group {
            margin-top: 8px;
        }
        .blur {
            font-size: 0.7em;
            color: #888;
        }
        .pickup {
            color: #FF7D81;
            font-weight: bold;
            font-size: 1.1em;
        }
        #w_hakui { color: #FFFFFF; }
        #b_hakui { color: #64C0FA; }
        #button {
            z-index: 5;
            position: fixed;
            top: 70vh;
            left: 50%;
            height: 100vh;
            transform: translate(-50%, -50%);
            display: none;
        }
        .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #000;
            font-weight: bold;
            transform: translate(-50%, -50%);
        }
        .now {
            z-index: 3;
            position: relative;
            top: 0;
            left: 0;
            width: min(50vh, 50vw);
            height: min(50vh, 50vw);
            transform: none;
            background: #FFA733;
            font-size: min(21vh, 21vw);
        }
        .r_b {
            z-index: 2;
            top: min(70vh, 70vw);
            left: min(60vh, 60vw);
            width: min(50vh, 50vw);
            height: min(50vh, 50vw);
            background: #F0F0F0;
            font-size: min(17vh, 17vw);
        }
        .l_b {
            z-index: 1;
            top: min(70vh, 70vw);
            left: calc(100% - min(60vh, 60vw));
            width: min(50vh, 50vw);
            height: min(50vh, 50vw);
            background: #F0F0F0;
            font-size: min(17vh, 17vw);
        }
        .r_b span, .l_b span {
            display: inline-block;
            position: relative;
            top: -4vh;
        }
    </style>
</head>
<body>
    <div id="button">
        <div class="circle now">現在</div>
        <div class="circle r_b"><span>+7日</span></div>
        <div class="circle l_b"><span>-7日</span></div>
    </div>
    <div id="scrollframe">
        <div id="content">
            <div id="dateData"></div>
            <div id="shiftData"></div>
        </div>
    </div>

    <script>
    const cache = new Map();
    const maxCacheSize = 30;
    const CACHE_EXPIRE_MS = 60 * 60 * 1000;
    
    let lastViewTime = Date.now();
    let G_current = 0;
    let OK_current = 0;

    async function fetchShift(address) {
        if (cache.has(address)) return cache.get(address);

        try {
            const response = await fetch(`../shift/${address}`);
            if (!response.ok) throw new Error(`Network response was not ok ${response.statusText}`);
            
            const data = await response.json();
            if (data.shift) {
                cache.set(address, data.shift);
                maintainCacheSize();
                return data.shift;
            }
            return 'shift not found';
        } catch (error) {
            console.error(error);
            throw error;
        }
    }

    function maintainCacheSize() {
        if (cache.size > maxCacheSize) {
            cache.delete(cache.keys().next().value);
        }
    }

    function removeOldestOrNewest(isPast) {
        if (cache.size >= maxCacheSize) {
            const keys = Array.from(cache.keys()).sort();
            cache.delete(isPast ? keys[keys.length - 1] : keys[0]);
        }
    }

    function getPresent(dayPlus, t = 0) {
        const today = new Date();
        today.setDate(today.getDate() + dayPlus);
        const hour = today.getHours();
        const minute = String(today.getMinutes()).padStart(2, '0');
        
        today.setHours(today.getHours() - 8);
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        
        return t === 0 ? `${year}${month}${day}` : `${hour}${minute}`;
    }

    function shiftWork(currentTimeNum, pageTodayStr, pageYesterdayStr) {
        const activeShifts = {};
        
        if (currentTimeNum >= 900 && currentTimeNum < 2100) activeShifts['A'] = pageTodayStr;
        if (currentTimeNum >= 2100 || currentTimeNum < 800) activeShifts['C'] = pageTodayStr;
        if (currentTimeNum >= 800 && currentTimeNum < 900) activeShifts['C'] = pageYesterdayStr;
        
        if (currentTimeNum >= 1450) {
            activeShifts['2'] = pageTodayStr;
            activeShifts['-2'] = pageTodayStr;
        }
        if (currentTimeNum >= 2350 || currentTimeNum < 800) {
            activeShifts['3'] = pageTodayStr;
            activeShifts['-3'] = pageTodayStr;
        }
        if (currentTimeNum >= 800 && currentTimeNum < 900) {
            activeShifts['3'] = pageYesterdayStr;
            activeShifts['-3'] = pageYesterdayStr;
        }
        
        if (currentTimeNum >= 800 && currentTimeNum < 1710) activeShifts['1'] = pageTodayStr;
        if (currentTimeNum >= 1150 && currentTimeNum < 2100) activeShifts['A2'] = pageTodayStr;
        
        return activeShifts;
    }

    async function mainWrite(current = 0) {
        const now = Date.now();
        if (now - lastViewTime >= CACHE_EXPIRE_MS) cache.clear();
        lastViewTime = now;

        const date_area = document.getElementById('dateData');
        const content_area = document.getElementById('shiftData');
        const content_scroll_area = document.getElementById('content');
        
        const savedScrollTop = content_scroll_area.scrollTop;
        const savedWindowScrollY = window.scrollY || window.pageYOffset;
        
        try {
            const shiftArray = await fetchShift(getPresent(current));
            if (shiftArray === 'shift not found') {
                date_area.textContent = '';
                content_area.textContent = 'データがありません';
                G_current = OK_current + 1;
                return;
            }
            OK_current = G_current;

            date_area.innerHTML = '';
            const parser = new DOMParser();
            const dateFragment = document.createDocumentFragment();

            if (getPresent(0) === shiftArray.index_day) {
                const span = document.createElement('span');
                span.className = 'pickup';
                if (shiftArray.days) {
                    const daysDoc = parser.parseFromString(shiftArray.days, 'text/html');
                    Array.from(daysDoc.body.childNodes).forEach(node => span.appendChild(node.cloneNode(true)));
                }
                dateFragment.appendChild(span);
            } else if (shiftArray.days) {
                const daysDoc = parser.parseFromString(shiftArray.days, 'text/html');
                Array.from(daysDoc.body.childNodes).forEach(node => dateFragment.appendChild(node.cloneNode(true)));
            }

            if (shiftArray.color) {
                const colorDoc = parser.parseFromString(shiftArray.color, 'text/html');
                Array.from(colorDoc.body.childNodes).forEach(node => dateFragment.appendChild(node.cloneNode(true)));
            }
            date_area.appendChild(dateFragment);

            const shiftFragment = document.createDocumentFragment();
            const data = JSON.parse(shiftArray.member);
            const order = ["有", "A", "B", "C", "2", "3", "1"];
            const keyNames = {
                "A": "A勤務", "A2": "A2", "B": "B勤務", "C": "C勤務",
                "1": "早番", "2": "中番", "-2": "中番応援", "3": "夜勤", "-3": "夜勤応援",
            };

            const currentTimeNum = parseInt(getPresent(0, 1), 10);
            const activeShifts = shiftWork(currentTimeNum, getPresent(0), getPresent(-1));
            const dataDateStr = String(shiftArray.index_day);

            const unassignedKeys = Object.keys(data).filter(key => !order.includes(key));
            const assignedKeys = order.filter(key => data[key]);
            const displayKeys = [...unassignedKeys, ...assignedKeys];

            const hasNamedShift = Object.keys(data).some(key => key in keyNames && Array.isArray(data[key]) && data[key].length > 0);

            if (!hasNamedShift) {
                const yasumiDiv = document.createElement('div');
                yasumiDiv.className = "group";
                yasumiDiv.innerHTML = "★★★休み★★★<br>";
                shiftFragment.appendChild(yasumiDiv);
            }

            for (const key of displayKeys) {
                const isNamed = key in keyNames;
                const displayKey = isNamed ? keyNames[key] : key;
                const mark = isNamed ? "■■■" : "□□□";
                
                const groupDiv = document.createElement('div');
                groupDiv.className = (activeShifts[key] === dataDateStr) ? "group pickup" : "group";
                groupDiv.innerHTML = `${mark}[ ${displayKey} ]${mark}<br>`;
                
                if (Array.isArray(data[key])) {
                    data[key].forEach(member => {
                        groupDiv.appendChild(document.createTextNode(`　${member}`));
                        groupDiv.appendChild(document.createElement('br'));
                    });
                }
                shiftFragment.appendChild(groupDiv);
            }
            
            content_area.innerHTML = '';
            content_area.appendChild(shiftFragment);
            
            window.scrollTo(0, savedWindowScrollY);
            content_scroll_area.scrollTo(0, savedScrollTop);
            
        } catch (error) {
            content_area.textContent = 'Error loading shift data';
        }

        const stock = 9;
        for (let i = current - stock; i <= current + stock; i++) {
            if (i !== current) {
                const dateStr = getPresent(i);
                if (!cache.has(dateStr)) {
                    fetchShift(dateStr).catch(() => {});
                }
            }
        }
    }

    function initButtons() {
        const btn = document.getElementById('button');
        
        const touchendClickHandler = (event) => {
            event.preventDefault();
            const target = event.target.closest('.circle');
            if (!target) return;

            document.body.scrollIntoView(true);
            if (target.classList.contains('now')) G_current = 0;
            else if (target.classList.contains('r_b')) G_current += 7;
            else if (target.classList.contains('l_b')) G_current -= 7;
            
            if (target.classList.contains('now') || target.classList.contains('r_b') || target.classList.contains('l_b')) {
                mainWrite(G_current);
            }
        };

        btn.addEventListener('touchend', touchendClickHandler);
        btn.addEventListener('click', touchendClickHandler);
    }

    (function() {
        let isSwiping = false, startX, currentX, longPressTimer = null, hasMoved = false, startTime = 0, tappedElement = null, isLongPress = false;
        const threshold = 50, LONG_PRESS_DURATION = 1000, MOVE_THRESHOLD = 10, TAP_TIME_THRESHOLD = 400;
        const inPresent = document.getElementById('content');
        const scrollFrame = document.getElementById('scrollframe');
        const buttonLayer = document.getElementById('button');
        
        mainWrite();
        initButtons();

        async function animateSwipe(direction) {
            const width = window.innerWidth;
            inPresent.style.transition = 'transform 0.15s ease-in';
            inPresent.style.transform = `translateX(${direction * width}px)`;

            await new Promise(resolve => setTimeout(resolve, 50));
            await mainWrite(G_current);

            inPresent.style.transition = 'none';
            inPresent.style.transform = `translateX(${-direction * width}px)`;
    
            inPresent.offsetHeight;
            
            inPresent.style.transition = 'transform 0.15s cubic-bezier(0, 1.17, 0.86, 0.99)';
            inPresent.style.transform = 'translateX(0px)';
        }

        function handleTap(element) {
            if (!element.closest('.circle')) {
                scrollFrame.style.height = '100%';
                buttonLayer.style.display = 'none';
            }
        }

        function handleLongPress() {
            scrollFrame.style.height = '100vh';
            buttonLayer.style.display = 'block';
        }

        function handlePointerStart(e) {
            startX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX;
            currentX = startX;
            startTime = Date.now();
            isSwiping = true;
            hasMoved = false;
            isLongPress = false;
            tappedElement = e.target;
            inPresent.style.transition = 'none';
            
            longPressTimer = setTimeout(() => {
                if (!hasMoved) {
                    isLongPress = true;
                    handleLongPress();
                }
            }, LONG_PRESS_DURATION);
        }

        function handlePointerMove(e) {
            if (!isSwiping) return;
            currentX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX;
            const distance = Math.abs(currentX - startX);
            
            if (distance > MOVE_THRESHOLD && !hasMoved) {
                hasMoved = true;
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }
            }
            inPresent.style.transform = `translateX(${currentX - startX}px)`;
        }

        function handlePointerEnd(e) {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
            if (!isSwiping) return;
            
            isSwiping = false;
            currentX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX;
            const distance = Math.abs(currentX - startX);
            const duration = Date.now() - startTime;

            if (distance < MOVE_THRESHOLD && duration < TAP_TIME_THRESHOLD && !isLongPress) {
                inPresent.style.transition = 'transform 0.1s ease';
                inPresent.style.transform = 'translateX(0px)';
                handleTap(tappedElement);
            } 
            else if (isLongPress) {
                inPresent.style.transition = 'transform 0.1s ease';
                inPresent.style.transform = 'translateX(0px)';
            } 
            else {
                scrollFrame.style.height = '100%';
                buttonLayer.style.display = 'none';
                
                const realDistance = currentX - startX;
                if (realDistance > threshold) {
                    G_current--;
                    removeOldestOrNewest(true);
                    animateSwipe(1);
                } else if (realDistance < -threshold) {
                    G_current++;
                    removeOldestOrNewest(false);
                    animateSwipe(-1);
                } else {
                    inPresent.style.transition = 'transform 0.2s cubic-bezier(0, 1.17, 0.86, 0.99)';
                    inPresent.style.transform = 'translateX(0px)';
                }
            }
        }

        document.addEventListener('touchstart', handlePointerStart, { passive: true });
        document.addEventListener('touchmove', handlePointerMove, { passive: true });
        document.addEventListener('touchend', handlePointerEnd, { passive: true });
        
        document.addEventListener('mousedown', handlePointerStart, { passive: true });
        document.addEventListener('mousemove', handlePointerMove, { passive: true });
        document.addEventListener('mouseup', handlePointerEnd, { passive: true });
    })();
    </script>
</body>
</html>
